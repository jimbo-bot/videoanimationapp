name: Fast Build APK with Cache

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Setup Java 17
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Setup Node.js 18
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Step 4: Cache node_modules
      - name: Cache Node Modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      # Step 5: Cache Gradle for faster builds
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('platforms/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Step 6: Install Cordova globally
      - name: Install Cordova
        run: npm install -g cordova

      # Step 7: Install project dependencies (skip dev)
      - name: Install deps
        run: npm install --omit=dev || true

      # Step 8: Clean Android platform
      - name: Clean platform
        run: rm -rf platforms/android || true

      # Step 9: Add Android platform
      - name: Add Android
        run: cordova platform add android

      # Step 10: Build APK (debug, faster)
      - name: Build APK
        run: cordova build android --debug --no-telemetry

      # Step 11: Upload generated APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Fast-APK
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
